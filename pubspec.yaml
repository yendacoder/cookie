name: cookie
description: Client application for Discuit social platform.
publish_to: 'none'
version: 2.0.0+200000

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.2

  # Networking
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # Data models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

  # UI
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.0
  shared_preferences: ^2.5.5
  image_picker: ^1.2.2
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.3.1

  # Localization
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

flutter:
  generate: true
  uses-material-design: true
