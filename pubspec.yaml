name: cookie
description: Client application for Discuit social platform.
publish_to: 'none'
version: 2.1.0+201000

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.2

  # Networking
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  http: ^1.6.0

  # Data models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

  # UI
  cupertino_icons: ^1.0.9
  liquid_glass_widgets: ^0.13.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.0
  shared_preferences: ^2.5.5
  image_picker: ^1.2.2
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.3.1
  youtube_player_iframe: ^6.0.0
  gif_view: ^1.0.3
  share_plus: ^13.1.0
  file_saver: ^0.4.0

  # Localization
  intl: ^0.20.2

  # Misc
  html: ^0.15.6
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true

flutter_launcher_icons:
  image_path: "icon_fg.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "icon_fg.png"
  ios: true
  android: true
  remove_alpha_ios: true